
name: Sync to Index
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract & Dispatch
        run: |
          # Get the path of the changed manifest.json
          MANIFEST=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'manifest.json' | head -1)
          if [ -z "$MANIFEST" ]; then exit 0; fi
          
          # Run the extractor
          PAYLOAD=$(python3 scripts/extractor.py $MANIFEST)
          
          # Send to Master Index
          curl -X POST https://api.github.com/repos/${{ github.repository_owner }}/master-index/dispatches \
          -H "Authorization: Bearer ${{ secrets.GLOBAL_SYNC_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -d "{\"event_type\": \"shard_update\", \"client_payload\": $PAYLOAD}"
