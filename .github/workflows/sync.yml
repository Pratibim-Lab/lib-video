
name: Sync to Index
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract & Dispatch
        run: |
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            MANIFEST=$(git ls-files | grep 'manifest.json' | head -1)
          else
            MANIFEST=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} | grep 'manifest.json' | head -1)
          fi
          if [ -z "$MANIFEST" ]; then exit 0; fi
          PAYLOAD=$(python3 scripts/extractor.py "$MANIFEST")
          curl -X POST https://api.github.com/repos/${{ github.repository_owner }}/master-index/dispatches \
          -H "Authorization: token ${{ secrets.GLOBAL_SYNC_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -d "{\"event_type\": \"shard_update\", \"client_payload\": $PAYLOAD}"
